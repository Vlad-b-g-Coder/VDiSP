<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Green Hotel</title>
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styleAll.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .site-wrapper {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
        }

        #dynamic-content {
            position: absolute;
            top: 200px;
            left: 0;
            right: 0;

            height: 1920px;
            overflow-y: auto;
        }
        #dynamic-content > * {
            transform: translateY(-300px);
        }
        #dynamic-content::-webkit-scrollbar {
            width: 4px;
        }

        #dynamic-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        #dynamic-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .v1_2 {
            position: relative;
            z-index: 10;
        }

    </style>
</head>
<body>
<div class="site-wrapper">

    <div class="v1_2">

        <div class="v1_3" id="bg-gradient"></div>
        <div class="v1_5"></div>

        <div class="v1_13" id="bg-rounded"></div>
        <div id="dynamic-content"></div>
        <div class="vhod" style="cursor:pointer;">
            <div class="v1_6"></div>
            <span class="v1_7">Войти</span>
        </div>
        <div class="v1_8"></div>
        <div class="v1_9"></div>
        <div class="v5_22"></div>
        <div class="v4_15"></div>
        <span class="v1_10">RU</span>
        <span class="v1_11">Home</span>
        <!-- поиск -->
        <div class="v4_2">
            <span class="v4_9">Куда едем?</span>
            <span class="city-value">Афины</span>
        </div>

        <!--  -->
        <div class="v4_3">
            <span class="v4_6"></span>
            <span class="dates-value"></span>
        </div>

        <!-- Гости -->
        <div class="v4_4">
            <span class="v4_5">Гости</span>
            <span class="guests-value">2</span>
        </div>
        <span class="v4_7"></span>
        <span class="v4_8"></span>
        <div class="strelka">
            <div class="v4_11"></div>
            <span class="v4_12">-></span>
        </div>




    </div>

</div>
<script>
    // Растягиваем v1_3 и v1_13 до низа видимого экрана + хвостик
    // Переводим реальные пиксели в координаты дизайна (1080px wide)
    function stretchBgElements() {
        const scale = window.innerWidth / 1080;
        // Высота экрана в единицах дизайна + хвостик 200px
        const designHeight = Math.ceil(window.innerHeight / scale) + 200;

        const bg = document.getElementById('bg-gradient');
        const rd = document.getElementById('bg-rounded');

        if (bg) {
            bg.style.height = designHeight + 'px';
            bg.style.overflow = 'visible';
        }
        if (rd) {
            // v1_13 начинается с top:143px, вычитаем смещение
            rd.style.height = (designHeight - 143) + 'px';
            rd.style.overflow = 'visible';
        }

        // Также убираем overflow:hidden у v1_2 чтобы дочерние не обрезались
        const v12 = document.querySelector('.v1_2');
        if (v12) v12.style.overflow = 'visible';
    }

    stretchBgElements();
    window.addEventListener('resize', stretchBgElements);
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="search-header.js"></script>
<script src="script.js"></script>
</body>
</html>
