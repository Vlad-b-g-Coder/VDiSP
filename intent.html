<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Green Hotel</title>
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styleAll.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* прибито к верху */
            min-height: 100vh;
            overflow: hidden; /* скролл внутри site-wrapper */
        }

        .site-wrapper {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            transform-origin: top left;
            visibility: hidden;
        }
        .site-wrapper.scaled {
            visibility: visible;
        }

        #dynamic-content {
            position: absolute;
            top: 200px;
            left: 0;
            right: 0;
            height: 1920px;
            overflow-y: auto;
        }
        #dynamic-content > * {
            transform: translateY(-300px);
        }
        #dynamic-content::-webkit-scrollbar {
            width: 4px;
        }
        #dynamic-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        #dynamic-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .v1_2 {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="site-wrapper">

    <div class="v1_2">

        <div class="v1_3"></div>
        <div class="v1_5"></div>

        <div class="v1_13"></div>
        <div id="dynamic-content"></div>
        <div class="vhod" style="cursor:pointer;">
            <div class="v1_6"></div>
            <span class="v1_7">Войти</span>
        </div>
        <div class="v1_8"></div>
        <div class="v1_9"></div>
        <div class="v5_22"></div>
        <div class="v4_15"></div>
        <span class="v1_10">RU</span>
        <span class="v1_11">Home</span>
        <!-- поиск -->
        <div class="v4_2">
            <span class="v4_9">Куда едем?</span>
            <span class="city-value">Афины</span>
        </div>

        <div class="v4_3">
            <span class="v4_6"></span>
            <span class="dates-value"></span>
        </div>

        <!-- Гости -->
        <div class="v4_4">
            <span class="v4_5">Гости</span>
            <span class="guests-value">2</span>
        </div>
        <span class="v4_7"></span>
        <span class="v4_8"></span>
        <div class="strelka">
            <div class="v4_11"></div>
            <span class="v4_12">-></span>
        </div>

    </div>

</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="search-header.js"></script>
<script src="script.js"></script>
<script>
    (function() {
        function scaleSiteWrapper() {
            const wrapper = document.querySelector('.site-wrapper');
            if (!wrapper) return;
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const designW = 1080;
            const designH = 1920;
            if (vw < designW) {
                const scale = vw / designW;
                wrapper.style.left = '0px';
                wrapper.style.transformOrigin = 'top left';
                wrapper.style.transform = 'scale(' + scale + ')';
            } else {
                const scale = Math.min(vw / designW, vh / designH);
                const offsetX = (vw - designW * scale) / 2;
                wrapper.style.left = offsetX + 'px';
                wrapper.style.transformOrigin = 'top left';
                wrapper.style.transform = 'scale(' + scale + ')';
            }
            wrapper.classList.add('scaled');
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', scaleSiteWrapper);
        } else {
            scaleSiteWrapper();
        }
        window.addEventListener('resize', scaleSiteWrapper);
    })();
</script>
</body>
</html>
