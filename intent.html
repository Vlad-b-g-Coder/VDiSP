<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Green Hotel</title>
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styleAll.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            background: #000;
            overflow-x: hidden;
        }

        body {
            display: block;
            margin: 0;
            padding: 0;
        }

        .site-wrapper {
            width: 1080px;
            position: relative;
            overflow-x: hidden;
            transform-origin: top left;
            visibility: hidden;
        }
        .site-wrapper.scaled {
            visibility: visible;
        }
    </style>
</head>
<body>
<div class="site-wrapper">

    <div class="v1_2">

        <div class="v1_3"></div>
        <div class="v1_5"></div>

        <div class="v1_13"></div>
        <div id="dynamic-content"></div>
        <div class="vhod" style="cursor:pointer;">
            <div class="v1_6"></div>
            <span class="v1_7">Войти</span>
        </div>
        <div class="v1_8"></div>
        <div class="v1_9"></div>
        <div class="v5_22"></div>
        <div class="v4_15"></div>
        <span class="v1_10">RU</span>
        <span class="v1_11">Home</span>
        <!-- поиск -->
        <div class="v4_2">
            <span class="v4_9">Куда едем?</span>
            <span class="city-value">Афины</span>
        </div>

        <!--  -->
        <div class="v4_3">
            <span class="v4_6"></span>
            <span class="dates-value"></span>
        </div>

        <!-- Гости -->
        <div class="v4_4">
            <span class="v4_5">Гости</span>
            <span class="guests-value">2</span>
        </div>
        <span class="v4_7"></span>
        <span class="v4_8"></span>
        <div class="strelka">
            <div class="v4_11"></div>
            <span class="v4_12">-></span>
        </div>




    </div>

</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="search-header.js"></script>
<script src="script.js"></script>
<script>
    (function() {
        function scaleSiteWrapper() {
            const wrapper = document.querySelector('.site-wrapper');
            if (!wrapper) return;
            const scale = window.innerWidth / 1080;
            wrapper.style.transformOrigin = 'top left';
            wrapper.style.transform = `scale(${scale})`;
            document.body.style.height = (wrapper.scrollHeight * scale) + 'px';
            wrapper.classList.add('scaled');
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', scaleSiteWrapper);
        } else {
            scaleSiteWrapper();
        }
        window.addEventListener('resize', scaleSiteWrapper);
    })();
</script>
</body>
</html>
